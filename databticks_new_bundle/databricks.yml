# This is a Databricks asset bundle definition for databticks_new_bundle.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: databticks_new_bundle
  uuid: 17efea43-a283-4b61-bdd3-e1b0e831fcb9

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-2085e900-dd5e.cloud.databricks.com
    variables:
      catalog: dev
      schema: dev
    presets:
      artifacts_dynamic_version: true
  prod:
    mode: production
    workspace:
      host: https://dbc-2085e900-dd5e.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/ch.challa@cgi.com to make sure we only have a single copy.
      root_path: /Workspace/databricks_setup
    variables:
      catalog: prod
      schema: prod
    permissions:
      - user_name: ch.challa@cgi.com
        level: CAN_MANAGE
